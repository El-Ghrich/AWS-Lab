---
- name: Installation de Docker et Nginx sur Amazon Linux
  hosts: all
  become: yes
  tasks:
    - name: Mettre à jour les paquets (DNF)
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Installer Docker
      dnf:
        name: docker
        state: present

    - name: Démarrer le service Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter l'utilisateur au groupe docker
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Lancement du conteneur Nginx
      community.docker.docker_container:
        name: mon-serveur-web
        image: nginx:latest
        state: started
        restart_policy: always
        published_ports:
          - "80:80"