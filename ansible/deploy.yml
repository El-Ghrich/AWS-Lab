---
- name: Déploiement de l'application Microservices
  hosts: all
  become: yes
  tasks:
    - name: Mettre à jour les paquets (DNF)
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Installer Docker
      dnf:
        name: docker
        state: present

    - name: Démarrer le service Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter l'utilisateur au groupe docker
      user:
        name: ec2-user
        groups: docker
        append: yes

    # --- INSTALLATION DE DOCKER COMPOSE V2 MANUELLE ---
    - name: Créer le dossier pour le plugin Docker Compose
      file:
        path: /usr/libexec/docker/cli-plugins
        state: directory
        mode: '0755'

    - name: Télécharger Docker Compose V2 depuis GitHub
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/libexec/docker/cli-plugins/docker-compose
        mode: '0755' # Rend le fichier exécutable

    # --- DÉPLOIEMENT DE TON APPLICATION ---
    - name: Créer le dossier de l'application
      file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Copier le fichier docker-compose.yml
      copy:
        src: ./docker-compose.yml
        dest: /home/ec2-user/app/docker-compose.yml

    - name: Créer le fichier .env pour le backend
      copy:
        dest: /home/ec2-user/app/.env.backend
        content: |
          DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=cv_db;Username=postgres;Password=postgres

    - name: Créer le fichier .env pour l'AI
      copy:
        dest: /home/ec2-user/app/.env.ai
        content: |
          OPENAI_API_KEY=ta_cle_secrete

    - name: Lancer Docker Compose
      command: docker compose up -d
      args:
        chdir: /home/ec2-user/app