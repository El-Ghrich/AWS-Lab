---
- name: Déploiement de l'application Microservices
  hosts: all
  become: yes
  tasks:
    - name: Mettre à jour les paquets (DNF)
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Installer Docker et le plugin Docker Compose
      dnf:
        name: 
          - docker
          - docker-compose-plugin
        state: present

    - name: Démarrer le service Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter l'utilisateur au groupe docker
      user:
        name: ec2-user
        groups: docker
        append: yes

    # --- NOUVELLES ÉTAPES ---
    
    - name: Créer le dossier de l'application
      file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Copier le fichier docker-compose.yml
      copy:
        src: ./docker-compose.yml # Ce fichier doit être dans le même dossier que ce playbook sur GitHub
        dest: /home/ec2-user/app/docker-compose.yml

    - name: Créer le fichier .env pour le backend
      copy:
        dest: /home/ec2-user/app/.env.backend
        content: |
          # Ajoute tes variables secrètes ici plus tard
          DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=cv_db;Username=postgres;Password=postgres

    - name: Créer le fichier .env pour l'AI
      copy:
        dest: /home/ec2-user/app/.env.ai
        content: |
          # Ajoute tes variables secrètes ici plus tard
          OPENAI_API_KEY=ta_cle_secrete

    - name: Lancer Docker Compose
      command: docker compose up -d
      args:
        chdir: /home/ec2-user/app